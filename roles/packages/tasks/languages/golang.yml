- name: Install or upgrade Go on macOS
  homebrew:
    name: golang
    state: latest
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install Go development tools on macOS
  homebrew:
    name: "{{ item }}"
    state: latest
  loop:
    - go
    - goimports
    - golangci-lint
    - delve
  when: ansible_facts['os_family'] == 'Darwin'

- name: Install or upgrade Go on Debian/Ubuntu
  apt:
    name: golang
    state: latest
    update_cache: yes
  when: ansible_facts['os_family'] == 'Debian'
  become: yes

- name: Install Go development tools on Debian/Ubuntu
  apt:
    name: "{{ item }}"
    state: latest
    update_cache: yes
  become: yes
  loop:
    - delve
  when: ansible_facts['os_family'] == 'Debian'

- name: Install gopls via go install
  shell: |
    go install golang.org/x/tools/gopls@latest
  environment:
    PATH: "{{ ansible_env.HOME }}/go/bin:{{ ansible_env.PATH }}"
  register: gopls_install
  changed_when: false
  failed_when: false

- name: Install goimports via go install
  shell: |
    go install golang.org/x/tools/cmd/goimports@latest
  environment:
    PATH: "{{ ansible_env.HOME }}/go/bin:{{ ansible_env.PATH }}"
  register: goimports_install
  changed_when: false
  failed_when: false

- name: Install golangci-lint via go install
  shell: |
    go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
  environment:
    PATH: "{{ ansible_env.HOME }}/go/bin:{{ ansible_env.PATH }}"
  register: golangci_lint_install
  changed_when: false
  failed_when: false

- name: Ensure Go bin is in PATH
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: 'export PATH="$HOME/go/bin:$PATH"'
    insertafter: EOF
    create: yes
    state: present